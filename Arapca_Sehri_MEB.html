<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arapça Şehri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #e0f2fe; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .rtl { direction: rtl; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- VERİ HAVUZU (5-8. Sınıf Müfredatı) ---
        const questionPool = {
            okul: [
                { q: 'مرحبا', a: 'Merhaba', options: ['Nasılsın?', 'Kitap', 'Merhaba'] },
                { q: 'كيف حالك؟', a: 'Nasılsın?', options: ['Nasılsın?', 'Adın ne?', 'Günaydın'] },
                { q: 'ما اسمك؟', a: 'Adın ne?', options: ['Nasılsın?', 'Adın ne?', 'Teşekkürler'] },
                { q: 'صباح الخير', a: 'Günaydın', options: ['İyi akşamlar', 'Günaydın', 'Görüşürüz'] },
                { q: 'كتاب', a: 'Kitap', options: ['Defter', 'Kalem', 'Kitap'] },
                { q: 'قلم', a: 'Kalem', options: ['Kalem', 'Silgi', 'Çanta'] },
                { q: 'مدرسة', a: 'Okul', options: ['Sınıf', 'Okul', 'Bahçe'] },
                { q: 'معلم', a: 'Öğretmen', options: ['Öğrenci', 'Müdür', 'Öğretmen'] }
            ],
            ev: [
                { q: 'أب', a: 'Baba', options: ['Anne', 'Baba', 'Dede'] },
                { q: 'أم', a: 'Anne', options: ['Kız kardeş', 'Anne', 'Teyze'] },
                { q: 'أخ', a: 'Erkek kardeş', options: ['Erkek kardeş', 'Amca', 'Baba'] },
                { q: 'أخت', a: 'Kız kardeş', options: ['Anne', 'Kız kardeş', 'Hala'] },
                { q: 'جد', a: 'Dede', options: ['Dayı', 'Amca', 'Dede'] },
                { q: 'بيت', a: 'Ev', options: ['Oda', 'Ev', 'Kapı'] },
                { q: 'باب', a: 'Kapı', options: ['Pencere', 'Duvar', 'Kapı'] }
            ],
            market: [
                { q: 'تفاحة', a: 'Elma', options: ['Armut', 'Elma', 'Muz'] },
                { q: 'حليب', a: 'Süt', options: ['Su', 'Çay', 'Süt'] },
                { q: 'ماء', a: 'Su', options: ['Su', 'Meyve Suyu', 'Ayran'] },
                { q: 'خبز', a: 'Ekmek', options: ['Peynir', 'Ekmek', 'Zeytin'] },
                { q: 'موز', a: 'Muz', options: ['Çilek', 'Elma', 'Muz'] },
                { q: 'سوق', a: 'Market', options: ['Bakkal', 'Market', 'Manav'] }
            ],
            hastane: [
                { q: 'طبيب', a: 'Doktor', options: ['Hemşire', 'Doktor', 'Hasta'] },
                { q: 'ممرضة', a: 'Hemşire', options: ['Doktor', 'Hemşire', 'Eczacı'] },
                { q: 'مستشفى', a: 'Hastane', options: ['Sağlık Ocağı', 'Eczane', 'Hastane'] },
                { q: 'مريض', a: 'Hasta', options: ['Hasta', 'Doktor', 'İlaç'] },
                { q: 'دواء', a: 'İlaç', options: ['Şurup', 'İğne', 'İlaç'] }
            ]
        };

        // --- YARDIMCI FONKSİYONLAR ---
        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);
        const getRandomQuestions = (category, count) => shuffleArray(questionPool[category]).slice(0, count);

        // --- ANA UYGULAMA ---
        function App() {
            const [screen, setScreen] = React.useState('login'); // login, map, game, result
            const [playerName, setPlayerName] = React.useState('');
            const [mode, setMode] = React.useState('learning'); // learning, champion
            const [score, setScore] = React.useState(0);
            const [category, setCategory] = React.useState(null);
            const [leaderboard, setLeaderboard] = React.useState([]);

            // Skorları Yükle
            React.useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('arapcaScores')) || [];
                setLeaderboard(saved.sort((a, b) => b.score - a.score).slice(0, 5));
            }, [screen]);

            // Skoru Kaydet
            const saveScore = (finalScore) => {
                const saved = JSON.parse(localStorage.getItem('arapcaScores')) || [];
                saved.push({ name: playerName, score: finalScore });
                localStorage.setItem('arapcaScores', JSON.stringify(saved));
            };

            const goHome = () => {
                setScreen('login');
                setScore(0);
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4 relative">
                    {/* Her Ekranda Bulunan Ev Butonu */}
                    {screen !== 'login' && (
                        <button onClick={goHome} className="absolute top-4 left-4 bg-white p-3 rounded-xl shadow-md hover:bg-gray-100 transition">
                            <i className="fa-solid fa-house text-2xl text-teal-600"></i>
                        </button>
                    )}

                    {/* EKRAN YÖNETİMİ */}
                    {screen === 'login' && <LoginScreen name={playerName} setName={setPlayerName} mode={mode} setMode={setMode} onStart={() => setScreen('map')} leaderboard={leaderboard} />}
                    {screen === 'map' && <MapScreen onSelect={(cat) => { setCategory(cat); setScreen('game'); }} />}
                    {screen === 'game' && <GameScreen category={category} mode={mode} score={score} setScore={setScore} onFinish={(finalScore) => { saveScore(finalScore); setScreen('result'); }} goHome={goHome} />}
                    {screen === 'result' && <ResultScreen score={score} onHome={goHome} />}
                </div>
            );
        }

        // --- 1. GİRİŞ VE SKOR EKRANI ---
        function LoginScreen({ name, setName, mode, setMode, onStart, leaderboard }) {
            return (
                <div className="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 text-center border-4 border-teal-100">
                    <div className="bg-teal-500 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                        <i className="fa-solid fa-graduation-cap text-4xl text-white"></i>
                    </div>
                    <h1 className="text-4xl font-bold text-gray-800 mb-2">Arapça Şehri</h1>
                    <p className="text-gray-500 mb-8">Ortaokul Macerası</p>

                    <input 
                        type="text" 
                        placeholder="İsmini Yaz..." 
                        value={name} 
                        onChange={(e) => setName(e.target.value)}
                        className="w-full p-4 mb-4 border-2 border-gray-200 rounded-xl text-lg text-center focus:border-teal-500 focus:outline-none"
                    />

                    <div className="flex gap-2 mb-6">
                        <button onClick={() => setMode('learning')} className={`flex-1 p-3 rounded-xl font-bold transition ${mode === 'learning' ? 'bg-blue-100 text-blue-700 border-2 border-blue-400' : 'bg-gray-50 text-gray-400 border-2 border-transparent'}`}>
                            Öğrenme Modu
                        </button>
                        <button onClick={() => setMode('champion')} className={`flex-1 p-3 rounded-xl font-bold transition ${mode === 'champion' ? 'bg-orange-100 text-orange-700 border-2 border-orange-400' : 'bg-gray-50 text-gray-400 border-2 border-transparent'}`}>
                            Şampiyon Modu
                        </button>
                    </div>

                    <button 
                        onClick={onStart} 
                        disabled={!name.trim()} 
                        className={`w-full p-4 rounded-xl text-xl font-bold text-white shadow-lg transition ${name.trim() ? 'bg-teal-500 hover:bg-teal-600' : 'bg-gray-300 cursor-not-allowed'}`}
                    >
                        BAŞLA
                    </button>

                    {/* Skor Tablosu */}
                    <div className="mt-8 bg-gray-50 p-4 rounded-2xl border-2 border-gray-100">
                        <h3 className="text-lg font-bold text-gray-700 mb-3"><i className="fa-solid fa-trophy text-yellow-500 mr-2"></i> Liderlik Tablosu</h3>
                        {leaderboard.length === 0 ? <p className="text-gray-400 text-sm">Henüz kimse oynamadı.</p> : (
                            <ul className="text-left space-y-2">
                                {leaderboard.map((item, idx) => (
                                    <li key={idx} className="flex justify-between items-center bg-white p-2 rounded-lg shadow-sm">
                                        <span className="font-bold text-gray-600">{idx + 1}. {item.name}</span>
                                        <span className="bg-teal-100 text-teal-700 px-2 py-1 rounded-md font-bold">{item.score} Puan</span>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                </div>
            );
        }

        // --- 2. HARİTA EKRANI (TÜMÜ AÇIK) ---
        function MapScreen({ onSelect }) {
            const categories = [
                { id: 'okul', label: 'Okul', icon: 'fa-school', color: 'bg-yellow-400', hover: 'hover:bg-yellow-500' },
                { id: 'ev', label: 'Ev', icon: 'fa-house-user', color: 'bg-purple-400', hover: 'hover:bg-purple-500' },
                { id: 'market', label: 'Market', icon: 'fa-cart-shopping', color: 'bg-green-400', hover: 'hover:bg-green-500' },
                { id: 'hastane', label: 'Hastane', icon: 'fa-hospital', color: 'bg-blue-400', hover: 'hover:bg-blue-500' }
            ];

            return (
                <div className="text-center">
                    <h2 className="text-4xl font-bold text-gray-800 mb-10 bg-white inline-block px-8 py-4 rounded-full shadow-md">Nereye Gitmek İstersin?</h2>
                    <div className="grid grid-cols-2 gap-6 max-w-2xl mx-auto">
                        {categories.map(cat => (
                            <button 
                                key={cat.id} 
                                onClick={() => onSelect(cat.id)}
                                className={`${cat.color} ${cat.hover} text-white rounded-3xl p-8 flex flex-col items-center justify-center shadow-xl transition transform hover:scale-105 active:scale-95`}
                            >
                                <i className={`fa-solid ${cat.icon} text-6xl mb-4 opacity-90`}></i>
                                <span className="text-2xl font-bold uppercase tracking-wider">{cat.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 3. OYUN EKRANI ---
        function GameScreen({ category, mode, score, setScore, onFinish, goHome }) {
            const [questions, setQuestions] = React.useState([]);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [feedback, setFeedback] = React.useState(null); // 'correct', 'wrong'
            const [shuffledOptions, setShuffledOptions] = React.useState([]);

            React.useEffect(() => {
                const qList = getRandomQuestions(category, 5); // Her bölüm 5 rastgele soru
                setQuestions(qList);
                if(qList.length > 0) setShuffledOptions(shuffleArray(qList[0].options));
            }, [category]);

            if (questions.length === 0) return <div>Yükleniyor...</div>;

            const currentQ = questions[currentIndex];

            const handleAnswer = (selected) => {
                if (feedback) return; // Zaten cevaplandıysa tıklamayı engelle

                if (selected === currentQ.a) {
                    setFeedback('correct');
                    setScore(s => s + 20); // Soru başı 20 puan
                    setTimeout(() => nextQuestion(), 1000);
                } else {
                    setFeedback('wrong');
                    if (mode === 'champion') {
                        setTimeout(() => {
                            alert("Şampiyon Modu: Yanlış cevap verdin, başa dönüyoruz!");
                            goHome();
                        }, 1000);
                    } else {
                        setTimeout(() => nextQuestion(), 2000); // Öğrenme modunda doğruyu görmek için bekle
                    }
                }
            };

            const nextQuestion = () => {
                setFeedback(null);
                if (currentIndex + 1 < questions.length) {
                    setCurrentIndex(currentIndex + 1);
                    setShuffledOptions(shuffleArray(questions[currentIndex + 1].options));
                } else {
                    onFinish(score + (feedback==='correct'? 20 : 0));
                }
            };

            return (
                <div className="w-full max-w-xl bg-white rounded-3xl shadow-2xl p-8 text-center">
                    <div className="flex justify-between items-center mb-8 border-b-2 pb-4 border-gray-100">
                        <span className="bg-teal-100 text-teal-800 font-bold px-4 py-2 rounded-lg">Soru: {currentIndex + 1}/5</span>
                        <span className="bg-yellow-100 text-yellow-800 font-bold px-4 py-2 rounded-lg">{score} Puan</span>
                    </div>

                    <div className="bg-blue-50 rounded-2xl p-8 mb-8 shadow-inner rtl">
                        <h2 className="text-6xl font-bold text-gray-800">{currentQ.q}</h2>
                    </div>

                    <div className="space-y-4">
                        {shuffledOptions.map((opt, idx) => {
                            let btnClass = "bg-gray-100 text-gray-700 hover:bg-gray-200 border-2 border-transparent";
                            if (feedback === 'correct' && opt === currentQ.a) btnClass = "bg-green-500 text-white border-green-600 shadow-lg transform scale-105";
                            if (feedback === 'wrong' && opt === currentQ.a) btnClass = "bg-green-500 text-white border-green-600"; // Doğruyu göster
                            if (feedback === 'wrong' && opt !== currentQ.a) btnClass = "bg-red-500 text-white border-red-600 opacity-50";

                            return (
                                <button 
                                    key={idx} 
                                    onClick={() => handleAnswer(opt)}
                                    className={`w-full p-4 rounded-xl text-xl font-bold transition duration-300 ${btnClass}`}
                                >
                                    {opt}
                                </button>
                            );
                        })}
                    </div>

                    {feedback === 'wrong' && mode === 'learning' && (
                        <p className="mt-6 text-red-500 font-bold animate-pulse">Tekrar Dene! Doğrusunu öğrenmiş olduk.</p>
                    )}
                </div>
            );
        }

        // --- 4. SONUÇ EKRANI ---
        function ResultScreen({ score, onHome }) {
            return (
                <div className="w-full max-w-md bg-white rounded-3xl shadow-2xl p-10 text-center">
                    <i className="fa-solid fa-award text-8xl text-yellow-400 mb-6 drop-shadow-md"></i>
                    <h2 className="text-4xl font-bold text-gray-800 mb-4">Harikasın!</h2>
                    <p className="text-gray-500 mb-6">Bölümü başarıyla tamamladın.</p>
                    <div className="bg-teal-50 rounded-2xl p-6 mb-8 border-2 border-teal-100">
                        <span className="block text-sm text-teal-600 font-bold uppercase tracking-wider mb-2">Kazanılan Puan</span>
                        <span className="text-6xl font-bold text-teal-500">{score}</span>
                    </div>
                    <button 
                        onClick={onHome}
                        className="w-full bg-teal-500 hover:bg-teal-600 text-white p-4 rounded-xl text-xl font-bold shadow-lg transition"
                    >
                        Ana Ekrana Dön
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
